# --- Liquid Glass Config ---
autogenerated = 0

monitor=eDP-1,preferred,auto,1
monitor=HDMI-A-1,preferred,auto,1
monitor=,preferred,auto,1

general {
    gaps_in = 8
    gaps_out = 15
    border_size = 1
    col.active_border = rgba(ffffff44) 
    col.inactive_border = rgba(00000000)
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
    shadow {
        enabled = false
    }
}

input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    # ... resto de tu config
}

$mainMod = SUPER

# Autostart para la barra y el fondo
exec-once = waybar
exec-once = swaybg -m fill -i /usr/share/backgrounds/archlinux/flat-dark.png
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server
exec-once = sleep 2 && nwg-dock-hyprland -i 30 -mb 10 -p bottom -a center -l top -d -hd 200 -nolauncher

exec-once = swww-daemon
exec = swww img /home/robert/Downloads/def-wall.jpg
exec-once = pkill swayosd-server ; swayosd-server --top-margin 0.92
exec-once = agsv1
exec-once = swaync

# Atajos básicos

bind = SUPER, Q, exec, kitty
bind = SUPER, C, killactive, 
bind = SUPER, M, exit, 
bind = SUPER, B, exec, brave
bind = SUPER SHIFT, R, exec, killall waybar && waybar
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = SUPER, Escape, exec, ~/.config/hypr/scripts/quick-menu.sh
bind = SUPER, E, exec, thunar
bind = SUPER, P, pseudo, 
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, V, togglefloating,
bind = SUPER, N, exec, swaync-client -t -sw

# Control de medios (Play, Next, Prev)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Lanzar Wofi estilo Spotlight con Win + Espacio
bind = $mainMod, SPACE, exec, wofi --show drun --width 400 --height 350 --prompt "Buscar en el Sistema..." --allow-images

bind = $mainMod, Z, exec, killall -SIGRTMIN+1 nwg-dock-hyprland
bind = SUPER, X, movetoworkspace, special:magic
bind = SUPER, Z, togglespecialworkspace, magic

binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise

bind = , F5, exec, nwg-displays
bind = , F6, exec, hyprctl dispatch dpms toggle


bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise

debug {
    disable_logs = false
    enable_stdout_logs = false
    suppress_errors = true # <--- ESTA ES LA CLAVE
}

# --- REGLAS DE VENTANAS FLOTANTES (DIÁLOGOS) ---

# Regla para portales estándar (Thunar, GIMP, etc.)
windowrulev2 = float, class:(xdg-desktop-portal-gtk)
windowrulev2 = center, class:(xdg-desktop-portal-gtk)
windowrulev2 = size 900 600, class:(xdg-desktop-portal-gtk)

# Regla por título (Caza el "desea guardar" que sale en tu captura)
windowrulev2 = float, title:^(.*desea guardar.*)$
windowrulev2 = center, title:^(.*desea guardar.*)$

# REGLA POR TÍTULO (Más potente)
windowrulev2 = float, title:^(gsimplecal)$
windowrulev2 = opacity 0.82 override 0.75 override, title:^(gsimplecal)$
windowrulev2 = blur, title:^(gsimplecal)$
windowrulev2 = pin, title:^(gsimplecal)$

# === EFECTO GLASS PARA WOFI ===
windowrulev2 = float, class:^(wofi)$
windowrulev2 = noborders, class:^(wofi)$
windowrulev2 = stayfocused, class:^(wofi)$
windowrulev2 = opacity 0.85 override 0.75 override, class:^(wofi)$ # <--- TRANSLÚCIDO
windowrulev2 = blur, class:^(wofi)$ # <---  BLUR
# ==========================================
# REGLAS PARA BLUR (WOFI)
# ==========================================
layerrule = blur, wofi
layerrule = ignorezero, wofi

#EasyEffects
windowrulev2 = float, class:(easyeffects)
windowrulev2 = size 500 650, class(easyeffects)
windowrulev2 = move 320 15, class:(easyeffects)
windowrulev2 = pin, class:(easyeffects)
easyeffects --hide-window &

# Aplica el desenfoque a la capa de AGS
layerrule = blur, ags
layerrule = ignorealpha 0.3, ags 

blurls = swaync

systemctl --user stop dunst mako xfce4-notifyd
systemctl --user disable dunst mako xfce4-notifyd
systemctl --user mask dunst mako xfce4-notifyd

# Regla para que Steam no sea cuadrado y feo
windowrulev2 = opacity 0.85 override 0.85 override, class:^(steam)$
windowrulev2 = blur, class:^(steam)$
windowrulev2 = rounding 15, class:^(steam)$

# Esta regla es para atrapar específicamente los menús flotantes
windowrulev2 = stayfocused, title:^()$, class:^(steam)$
windowrulev2 = minsize 1 1, title:^()$, class:^(steam)$
